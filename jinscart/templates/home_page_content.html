{% load static %}

<!-- Feadtued Categories -->


    <!-- Featured Products -->

    <div class="small-container">
        <h2 class="title">Featured Products</h2>
        <div class="row">
            {% for product in featured_product %}
            <div class="col-4">
                <a href="{% url 'detail_product' product.id %}"><img src="{{product.image_url.url }}"></a>
                <h4>{{ product.name }}</h4>
        
                <p class="price">
                    ${{ product.price|floatformat:2 }}
                </p>
            </div>
            {% endfor %}
        </div>
        <h2 class="title">Latest Products</h2>
        <div class="row">
            {% for product in latest_product %}
            <div class="col-4">
                <a href="{% url 'detail_product' product.id %}"><img src="{{product.image_url.url }}"></a>
                <h4>{{ product.name }}</h4>
                <div class="rating">
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star"></i>
                    <i class="fa fa-star-o"></i>
                </div>
                <p class="price">
                    ${{ product.price|floatformat:2 }}
                </p>
            </div>
            {% endfor %}
        </div>
   
    </div>
